services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: resolve
      POSTGRES_USER: resolve
      POSTGRES_PASSWORD: resolve
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: resolve
      RABBITMQ_DEFAULT_PASS: resolve

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

# Neo4j: use AuraDB free tier (cloud) — no local container needed
# Set NEO4J_URI, NEO4J_USER, NEO4J_PASSWORD in .env

volumes:
  pgdata:
